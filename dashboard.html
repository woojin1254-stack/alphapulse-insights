<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 | Pet GPS Ring</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <header class="dashboard-header">
        <nav class="container user-nav">
            <a href="index.html" class="logo">Pet<span>GPS</span>Ring</a>
            <div class="nav-user-info">
                <div class="user-avatar" id="user-avatar-text">테</div>
                <span id="user-name">로딩 중...</span>
                <a href="#" class="btn-logout" onclick="logout()">로그아웃</a>
            </div>
        </nav>
    </header>

    <main class="container" style="padding: 60px 0;">
        <div class="section-title" style="text-align: left; margin-bottom: 40px;">
            <h2 style="font-size: 2.2rem;">반려동물 실시간 위치</h2>
            <p>현재 연결된 기기의 상태를 확인하세요.</p>
        </div>

        <div id="pets-container">
            <!-- 로딩 상태 표시 -->
            <div style="text-align: center; padding: 40px;">데이터를 불러오는 중...</div>
        </div>

        <section id="features" class="container" style="padding: 80px 0 0 0;">
            <div class="feature-grid" style="grid-template-columns: repeat(2, 1fr);">
                <div class="feature-card">
                    <div class="icon">⏱️</div>
                    <h3>활동 로그</h3>
                    <p>지난 24시간 동안의 이동 경로를 타임라인으로 확인하세요.</p>
                </div>
                <div class="feature-card">
                    <div class="icon">🔔</div>
                    <h3>알림 설정</h3>
                    <p>이동 알림, 배터리 부족 알림 등을 개별적으로 설정합니다.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        async function checkAuth() {
            if (!window.supabaseClient) {
                handleMockAuth();
                return;
            }

            try {
                const { data: { session } } = await window.supabaseClient.auth.getSession();
                if (!session) {
                    handleMockAuth();
                } else {
                    const user = session.user;
                    if (!user.user_metadata.onboarding_completed) {
                        window.location.href = 'onboarding.html';
                        return;
                    }
                    document.getElementById('user-name').textContent = user.user_metadata.nickname || user.user_metadata.full_name || user.email;
                    document.getElementById('user-avatar-text').textContent = (user.user_metadata.nickname || user.user_metadata.full_name || user.email).substring(0, 1);
                    fetchPets(user.id);
                }
            } catch (e) {
                console.error('Auth verification failed:', e);
                handleMockAuth();
            }
        }

        function handleMockAuth() {
            const mockUser = localStorage.getItem('pet_gps_user');
            if (!mockUser) {
                alert('로그인이 필요한 페이지입니다.');
                window.location.href = 'login.html';
            } else {
                const user = JSON.parse(mockUser);
                document.getElementById('user-name').textContent = user.name;
                document.getElementById('user-avatar-text').textContent = user.name.substring(0, 1);
                renderMockPet();
            }
        }

        async function fetchPets(userId) {
            const { data: pets, error } = await window.supabaseClient
                .from('pets')
                .select('*')
                .eq('owner_id', userId);

            if (error) {
                console.error('Error fetching pets:', error);
                document.getElementById('pets-container').innerHTML = '<p>데이터를 불러오는 중 오류가 발생했습니다.</p>';
                return;
            }

            if (!pets || pets.length === 0) {
                document.getElementById('pets-container').innerHTML = `
                    <div style="text-align: center; padding: 60px; background: white; border-radius: 30px; border: 1px dashed var(--border);">
                        <p style="margin-bottom: 20px;">등록된 반려동물이 없습니다.</p>
                        <button class="btn-primary" onclick="alert('기기 등록 기능 준비 중')">+ 기기 추가하기</button>
                    </div>
                `;
            } else {
                renderPets(pets);
            }
        }

        function renderPets(pets) {
            const container = document.getElementById('pets-container');
            container.innerHTML = pets.map(pet => `
                <div class="hero" style="padding: 0; background: white; border-radius: 30px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 30px;">
                    <div class="hero-image" style="flex: 2; border-radius: 0;">
                        <img src="hero.png" alt="Map View" style="border-radius: 0; box-shadow: none;">
                        <div class="status-card" style="bottom: 20px; left: 20px;">
                            <div class="status-info">
                                <strong>${pet.name}</strong> <span class="tag-online">${pet.status}</span>
                                <p>위치: L: ${pet.latitude}, G: ${pet.longitude}</p>
                            </div>
                        </div>
                    </div>
                    <div class="hero-content" style="padding: 40px; flex: 1;">
                        <h3 style="margin-bottom: 20px;">기기 설정</h3>
                        <div class="benefit-list" style="margin: 0 0 30px 0; max-width: none;">
                            <div class="benefit-item">🔋 배터리 잔량: <strong>${pet.battery_level}%</strong></div>
                            <div class="benefit-item">📡 신호 강도: <strong>${pet.signal_strength}</strong></div>
                            <div class="benefit-item">🏠 상태: <strong>${pet.status === 'online' ? '정상 연결' : '연결 끊김'}</strong></div>
                        </div>
                        <button class="btn-primary" style="width: 100%;">안전 구역 설정 수정</button>
                    </div>
                </div>
            `).join('');
        }

        function renderMockPet() {
            renderPets([{
                name: '초코 (테스트)',
                status: 'online',
                latitude: 37.51,
                longitude: 127.05,
                battery_level: 85,
                signal_strength: '상당히 좋음'
            }]);
        }

        async function logout() {
            if (window.supabaseClient) {
                await window.supabaseClient.auth.signOut();
            }
            localStorage.removeItem('pet_gps_user');
            window.location.href = 'index.html';
        }

        checkAuth();
    </script>
</body>
</html>
